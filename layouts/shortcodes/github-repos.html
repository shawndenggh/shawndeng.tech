<div id="github-app"></div>

<style>
.github-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.controls {
  margin-bottom: 30px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  align-items: center;
}

.search-box {
  flex: 1;
  min-width: 250px;
  padding: 12px 20px;
  border: 2px solid #e1e4e8;
  border-radius: 8px;
  font-size: 16px;
  transition: all 0.3s;
}

.search-box:focus {
  outline: none;
  border-color: #0366d6;
  box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1);
}

.filter-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 16px;
  border: 2px solid #e1e4e8;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 14px;
  font-weight: 500;
}

.filter-btn:hover {
  border-color: #0366d6;
  background: #f6f8fa;
}

.filter-btn.active {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: transparent;
}

.stats-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
  padding: 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px;
  color: white;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-icon {
  font-size: 24px;
}

.stat-value {
  font-size: 28px;
  font-weight: bold;
}

.stat-label {
  font-size: 14px;
  opacity: 0.9;
}

.repos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 25px;
  margin-bottom: 30px;
}

.repo-card {
  background: white;
  border: 1px solid #e1e4e8;
  border-radius: 12px;
  padding: 24px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.repo-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  transform: scaleX(0);
  transition: transform 0.3s;
}

.repo-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.repo-card:hover::before {
  transform: scaleX(1);
}

.repo-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.repo-name {
  font-size: 20px;
  font-weight: 600;
  color: #0366d6;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  word-break: break-word;
  flex: 1;
}

.repo-name:hover {
  text-decoration: underline;
}

.repo-visibility {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  background: #f6f8fa;
  border: 1px solid #e1e4e8;
  white-space: nowrap;
}

.repo-description {
  color: #586069;
  margin-bottom: 16px;
  line-height: 1.5;
  min-height: 40px;
}

.repo-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #586069;
}

.stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

.repo-language {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
  border-radius: 16px;
  font-size: 13px;
  font-weight: 500;
}

.language-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.loading {
  text-align: center;
  padding: 60px 20px;
  font-size: 18px;
  color: #586069;
}

.loading-spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #667eea;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

.error-message {
  text-align: center;
  padding: 60px 20px;
  color: #d73a49;
  font-size: 16px;
  background: #ffeef0;
  border-radius: 8px;
  margin: 20px 0;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: #586069;
  font-size: 18px;
}

@media (max-width: 768px) {
  .repos-grid {
    grid-template-columns: 1fr;
  }
  
  .stats-bar {
    flex-direction: column;
  }
}
</style>

<script>
(function() {
  'use strict';
  
  const username = 'shawndenggh';
  let allRepos = [];
  let filteredRepos = [];
  let currentLanguage = 'all';

  const languageColors = {
    JavaScript: '#f1e05a',
    Python: '#3572A5',
    Java: '#b07219',
    Go: '#00ADD8',
    TypeScript: '#2b7489',
    C: '#555555',
    'C++': '#f34b7d',
    'C#': '#178600',
    PHP: '#4F5D95',
    Ruby: '#701516',
    Swift: '#ffac45',
    Kotlin: '#F18E33',
    Rust: '#dea584',
    HTML: '#e34c26',
    CSS: '#563d7c',
    Vue: '#41b883',
    Dart: '#00B4AB',
    Shell: '#89e051',
    default: '#8257e6'
  };

  function getLanguageColor(language) {
    return languageColors[language] || languageColors.default;
  }

  function createApp() {
    const app = document.getElementById('github-app');
    app.innerHTML = `
      <div class="github-container">
        <div class="loading" id="loading">
          <div class="loading-spinner"></div>
          <p>正在加载 GitHub 仓库...</p>
        </div>
        
        <div id="github-content" style="display: none;">
          <div class="stats-bar" id="stats"></div>
          
          <div class="controls">
            <input 
              type="text" 
              id="search" 
              class="search-box" 
              placeholder="🔍 搜索仓库名称或描述..."
            />
            <div class="filter-buttons" id="filters"></div>
          </div>
          
          <div class="repos-grid" id="repos"></div>
          
          <div class="no-results" id="no-results" style="display: none;">
            😢 没有找到匹配的仓库
          </div>
        </div>
      </div>
    `;
  }

  async function fetchRepos() {
    try {
      console.log('开始获取仓库...');
      const response = await fetch('https://api.github.com/users/' + username + '/repos?sort=updated&per_page=100');
      
      if (!response.ok) {
        throw new Error('HTTP error! status: ' + response.status);
      }
      
      const repos = await response.json();
      console.log('获取到仓库数量:', repos.length);
      
      allRepos = repos.sort(function(a, b) {
        return b.stargazers_count - a.stargazers_count;
      });
      filteredRepos = allRepos;
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('github-content').style.display = 'block';
      
      renderStats();
      renderFilters();
      renderRepos();
    } catch (error) {
      console.error('加载失败:', error);
      document.getElementById('loading').innerHTML = '<div class="error-message">❌ 加载失败: ' + error.message + '<br><br>请检查网络连接或稍后重试</div>';
    }
  }

  function renderStats() {
    const totalRepos = allRepos.length;
    const totalStars = allRepos.reduce(function(sum, repo) {
      return sum + repo.stargazers_count;
    }, 0);
    const totalForks = allRepos.reduce(function(sum, repo) {
      return sum + repo.forks_count;
    }, 0);
    
    document.getElementById('stats').innerHTML = 
      '<div class="stat-item">' +
        '<span class="stat-icon">📦</span>' +
        '<div>' +
          '<div class="stat-value">' + totalRepos + '</div>' +
          '<div class="stat-label">仓库数量</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-item">' +
        '<span class="stat-icon">⭐</span>' +
        '<div>' +
          '<div class="stat-value">' + totalStars + '</div>' +
          '<div class="stat-label">总星标数</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-item">' +
        '<span class="stat-icon">🍴</span>' +
        '<div>' +
          '<div class="stat-value">' + totalForks + '</div>' +
          '<div class="stat-label">总 Fork 数</div>' +
        '</div>' +
      '</div>';
  }

  function renderFilters() {
    const languages = [];
    allRepos.forEach(function(repo) {
      if (repo.language && languages.indexOf(repo.language) === -1) {
        languages.push(repo.language);
      }
    });
    
    let filtersHTML = '<button class="filter-btn active" data-lang="all">全部</button>';
    languages.forEach(function(lang) {
      filtersHTML += '<button class="filter-btn" data-lang="' + lang + '">' + lang + '</button>';
    });
    
    document.getElementById('filters').innerHTML = filtersHTML;
    
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterByLanguage(this.getAttribute('data-lang'));
      });
    });
  }

  function filterByLanguage(language) {
    currentLanguage = language;
    
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.remove('active');
      if (btn.getAttribute('data-lang') === language) {
        btn.classList.add('active');
      }
    });
    
    applyFilters();
  }

  function searchRepos() {
    applyFilters();
  }

  function applyFilters() {
    const searchTerm = document.getElementById('search').value.toLowerCase();
    
    filteredRepos = allRepos.filter(function(repo) {
      const matchesLanguage = currentLanguage === 'all' || repo.language === currentLanguage;
      const matchesSearch = !searchTerm || 
        repo.name.toLowerCase().indexOf(searchTerm) !== -1 ||
        (repo.description && repo.description.toLowerCase().indexOf(searchTerm) !== -1);
      
      return matchesLanguage && matchesSearch;
    });
    
    renderRepos();
  }

  function renderRepos() {
    const reposContainer = document.getElementById('repos');
    const noResults = document.getElementById('no-results');
    
    if (filteredRepos.length === 0) {
      reposContainer.style.display = 'none';
      noResults.style.display = 'block';
      return;
    }
    
    reposContainer.style.display = 'grid';
    noResults.style.display = 'none';
    
    let html = '';
    filteredRepos.forEach(function(repo) {
      html += '<div class="repo-card">' +
        '<div class="repo-header">' +
          '<a href="' + repo.html_url + '" target="_blank" class="repo-name">📁 ' + repo.name + '</a>' +
          '<span class="repo-visibility">' + (repo.private ? '🔒 Private' : '🌍 Public') + '</span>' +
        '</div>' +
        '<p class="repo-description">' + (repo.description || '暂无描述') + '</p>' +
        '<div class="repo-stats">' +
          '<span class="stat">⭐ ' + repo.stargazers_count + '</span>' +
          '<span class="stat">🍴 ' + repo.forks_count + '</span>' +
          '<span class="stat">👁️ ' + repo.watchers_count + '</span>' +
        '</div>' +
        (repo.language ? 
          '<div class="repo-language">' +
            '<span class="language-dot" style="background: ' + getLanguageColor(repo.language) + '"></span>' +
            repo.language +
          '</div>' 
        : '') +
      '</div>';
    });
    
    reposContainer.innerHTML = html;
  }

  // 初始化
  function init() {
    createApp();
    setTimeout(function() {
      document.getElementById('search').addEventListener('input', searchRepos);
      fetchRepos();
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
